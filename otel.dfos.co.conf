<VirtualHost *:80>
    ServerName otel.dfos.co

    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName otel.dfos.co

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/STAR_dfos_co.crt
    SSLCertificateKeyFile /etc/ssl/key/custom.key
    SSLCACertificateFile /etc/ssl/certs/STAR_dfos_co.ca-bundle

    Protocols h2 http/1.1

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    Alias /app /var/www/html/app

    <Directory /var/www/html/app>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ProxyPass /grafana/ http://127.0.0.1:3000/grafana/
    ProxyPassReverse /grafana/ http://127.0.0.1:3000/grafana/

    ProxyPass /jaeger/ http://127.0.0.1:16686/jaeger/
    ProxyPassReverse /jaeger/ http://127.0.0.1:16686/jaeger/

    ErrorLog ${APACHE_LOG_DIR}/otel.dfos.co_error.log
    CustomLog ${APACHE_LOG_DIR}/otel.dfos.co_access.log combined
</VirtualHost>
